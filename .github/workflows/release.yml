name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    name: Build Windows installer
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install npm deps
        run: npm ci

      - name: Build & publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "MiniPaste ${{ github.ref_name }}"
          releaseBody: |
            ## Downloads
            - `minipaste_${{ github.ref_name }}_x64-setup.exe` — NSIS installer (recommended)
            - `minipaste_${{ github.ref_name }}_x64_en-US.msi` — MSI installer
          releaseDraft: false
          prerelease: false
